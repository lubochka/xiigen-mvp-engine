name: verification-before-completion
version: "1.1.0"
priority: MANDATORY
entry: SKILL.md
author: claudekit (adapted)
updated: "2026-03-18"
description: >
  Run verification commands and confirm output before claiming success.
  Iron Law: no completion claims without fresh verification evidence.
  "Should pass" is not evidence. Test output is evidence.
triggers:
  - "done"
  - "fixed"
  - "tests pass"
  - "ready to commit"
  - "about to push"
integrates_with:
  - systematic-debugging  # Phase 4 ends with verification
  - plan-review-skill     # Session-end Section A requires fresh evidence
