description: >
  Authoritative lookup table for all 48 XIIGen flows. Maps every flow to:
  F4 business spec availability and path, F3 ROLE-ANALYSIS-BATCH file,
  examination record status (ground truth where present for 38 flows),
  UI grammar type (G1-G7), and CFI notes. Single document Claude Code reads
  to answer "which file do I open for FLOW-XX's user intent?" and "what
  grammar does this flow use?". Contains CFI-12 BLOCKED flags for FLOW-04,
  FLOW-09, FLOW-34 (stale F1 spec — no UI design until Luba resolves).
  Contains CFI-05 per-row notes for FLOW-36..40 (Page rewrite needed —
  apply FLOW-45 RUN-52 template). FLOW-29 marked as reference implementation
  for G4 TOPOLOGY_CANVAS grammar.

