server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all non-asset requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — CRITICAL: use exact docker-compose service name 'server-e2e'
    # NOT 'server' — that is a different container. (WF-12 / B-1 fix)
    location /api/ {
        proxy_pass http://server-e2e:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Engine endpoints proxy
    location /engine/ {
        proxy_pass http://server-e2e:3000/engine/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Tenant-Id $http_x_tenant_id;
        proxy_read_timeout 60s;
    }

    # Health probe proxy
    location /health/ {
        proxy_pass http://server-e2e:3000/health/;
        proxy_set_header Host $host;
    }

    # Tenants API proxy
    location /tenants/ {
        proxy_pass http://server-e2e:3000/tenants/;
        proxy_set_header Host $host;
        proxy_set_header X-Tenant-Id $http_x_tenant_id;
    }
}
