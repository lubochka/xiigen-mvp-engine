# ═══════════════════════════════════════════════════════
# XIIGen Engine — CI Pipeline
# ═══════════════════════════════════════════════════════
# Trigger: push to main, pull_request to main
# Jobs: server-ci, client-ci, docker-build (optional)

name: XIIGen CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Documentation Claims ─────────────────────────
  docs-claims:
    name: Docs — Verify Claims
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Verify documentation claims
        run: bash scripts/verify-docs-claims.sh

  # ── Server CI ────────────────────────────────────
  server-ci:
    name: Server — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Cache node_modules
        uses: actions/cache@v4.2.3
        with:
          path: server/node_modules
          key: server-deps-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-deps-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ── Client CI ────────────────────────────────────
  client-ci:
    name: Client — Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Cache node_modules
        uses: actions/cache@v4.2.3
        with:
          path: client/node_modules
          key: client-deps-${{ hashFiles('client/package-lock.json') }}
          restore-keys: client-deps-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ── Docker Integration CI ────────────────────────
  docker-integration:
    name: Server — Docker Integration Tests
    runs-on: ubuntu-latest
    needs: [server-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: server

    services:
      elasticsearch:
        image: elasticsearch:8.12.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms256m -Xmx256m"
        ports:
          - "19200:9200"
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Cache node_modules
        uses: actions/cache@v4.2.3
        with:
          path: server/node_modules
          key: server-deps-${{ hashFiles('server/package-lock.json') }}
          restore-keys: server-deps-

      - name: Install dependencies
        run: npm ci

      - name: Run docker integration tests
        run: npm run test:docker
        env:
          TEST_ES_URL: http://localhost:19200
          SKIP_DOCKER_TESTS: "0"

  # ── Playwright E2E ───────────────────────────────
  playwright-e2e:
    name: Client — Playwright E2E
    runs-on: ubuntu-latest
    needs: [server-ci, client-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      elasticsearch:
        image: elasticsearch:8.12.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms256m -Xmx256m"
        ports:
          - "9200:9200"
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node 24
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "24"

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Start NestJS server
        working-directory: server
        run: npm run start:prod &
        env:
          PORT: 3000
          NODE_ENV: production
          DATABASE_PROVIDER: elasticsearch
          ELASTICSEARCH_URL: http://localhost:9200
          AI_PROVIDER: mock
          TENANT_KEY_ENCRYPTION_SECRET: ci-test-secret-32-chars-padding-x

      - name: Wait for server health
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/health && break
            sleep 3
          done

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install Playwright browser
        working-directory: client
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        working-directory: client
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            client/playwright-results/
            docs/phase-reports/PHASE-A1/snapshots/

  # ── Docker Build (optional) ──────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [server-ci, client-ci, docker-integration, playwright-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Build server image
        run: docker build -t xiigen-server:latest ./server

      - name: Build client image
        run: docker build -t xiigen-client:latest ./client
